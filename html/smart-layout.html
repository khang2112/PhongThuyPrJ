<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tự Động Bố Trí Phong Thủy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light pt-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0 p-4">
                <h3 class="text-center text-primary mb-4">Gợi Ý Bố Trí Nhà Ở (Gia Đình)</h3>
                
                <div class="row mb-3">
                    <div class="col">
                        <label>Năm sinh người Chồng</label>
                        <input type="number" id="namSinhChong" class="form-control" placeholder="VD: 1990">
                    </div>
                    <div class="col">
                        <label>Năm sinh người Vợ</label>
                        <input type="number" id="namSinhVo" class="form-control" placeholder="VD: 1992">
                    </div>
                </div>

                <button class="btn btn-warning w-100 fw-bold" onclick="tuDongBoTri()">
                    <i class="bi bi-magic"></i> Chạy Thuật Toán 1-Click
                </button>

                <!-- Vùng hiển thị kết quả -->
                <div id="vungKetQua" class="mt-4 d-none">
                    <div class="alert alert-info text-center fw-bold" id="thongTinChung"></div>
                    
                    <h5 class="mt-4">Bản Đồ Hướng Cửa & Nội Thất:</h5>
                    <ul class="list-group" id="danhSachBoTri">
                        <!-- Javascript sẽ đổ list vào đây -->
                    </ul>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    function tuDongBoTri() {
        const namChong = document.getElementById('namSinhChong').value;
        const namVo = document.getElementById('namSinhVo').value;

        if(!namChong || !namVo) {
            alert("Vui lòng nhập đầy đủ năm sinh của 2 vợ chồng!");
            return;
        }

        // Gọi API lên hệ thống "Trọng tài" Java
        fetch(`http://localhost:8080/api/bo-tri-thong-minh?namSinhChong=${namChong}&namSinhVo=${namVo}`)
            .then(res => res.json())
            .then(data => {
                // Hiển thị kết quả
                document.getElementById('vungKetQua').classList.remove('d-none');
                document.getElementById('thongTinChung').innerText = data.thongTinChung;
                
                const danhSach = document.getElementById('danhSachBoTri');
                danhSach.innerHTML = ''; // Xóa list cũ

                // Duyệt qua luật bố trí và in ra màn hình
                for (const [vatThe, huong] of Object.entries(data.quyTacBoTri)) {
                    // Phân loại màu sắc để dễ nhìn: Cái nào của Chồng (Xanh), Của vợ (Hồng)
                    let badgeColor = (vatThe === 'Cửa Chính' || vatThe === 'Sofa Phòng Khách' || vatThe === 'Bàn Thờ') 
                                     ? 'bg-primary' : 'bg-danger';

                    danhSach.innerHTML += `
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <b>${vatThe}</b>
                            <span class="badge ${badgeColor} rounded-pill fs-6">Quay về hướng: ${huong}</span>
                        </li>
                    `;
                }
            })
            .catch(err => alert("Lỗi kết nối Backend!"));
    }
</script>

</body>
</html>
