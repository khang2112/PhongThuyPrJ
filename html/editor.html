<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FengShui Architect - Chế độ Xây Dựng</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Con trỏ chuột khi đang ở chế độ vẽ */
        .cursor-draw { cursor: crosshair !important; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col text-slate-800">

    <!-- TOP NAV BAR -->
    <header class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-6 z-20 shrink-0 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-emerald-600 text-white p-1.5 rounded-md"><i class="fa-solid fa-yin-yang"></i></div>
            <h1 class="font-bold text-lg text-slate-700 tracking-tight">FengShui <span class="text-emerald-600">Architect</span></h1>
            <span id="trangThaiChung" class="text-xs font-medium bg-slate-100 text-slate-500 px-2 py-1 rounded ml-4 border border-slate-200">Chế độ: Xem 3D</span>
        </div>
    </header>

    <!-- MAIN WORKSPACE -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- SIDEBAR TRÁI: THƯ VIỆN & CÔNG CỤ -->
        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col z-10 shrink-0 shadow-[4px_0_15px_rgba(0,0,0,0.03)] overflow-y-auto">
            
            <!-- TOOL: VẼ TƯỜNG -->
            <div class="p-4 border-b border-slate-100 bg-slate-50">
                <h2 class="text-xs font-bold text-slate-800 uppercase tracking-wider mb-3"><i class="fa-solid fa-trowel-bricks mr-2 text-slate-500"></i>Công cụ Xây dựng</h2>
                <button id="btnVeTuong" onclick="batTatVeTuong()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-md text-sm transition flex justify-center items-center gap-2">
                    <i class="fa-solid fa-pen-ruler"></i> <span>Bắt đầu vẽ tường</span>
                </button>
                <p class="text-[10px] text-slate-500 mt-2 text-center hidden" id="huongDanVe">Click điểm đầu và điểm cuối để tạo tường. Bấm phím ESC để thoát.</p>
            </div>

            <!-- TOOL: THƯ VIỆN 3D (Của bạn) -->
            <div class="p-4 border-b border-slate-100">
                <h2 class="text-xs font-bold text-slate-800 uppercase tracking-wider mb-3"><i class="fa-solid fa-couch mr-2 text-slate-500"></i>Thư viện Nội thất</h2>
                <div class="space-y-3">
                    <div onclick="taiMoHinh('models/giuong_ngu.glb', 'Giường Ngủ')" class="p-2.5 bg-white border border-slate-200 rounded-lg cursor-pointer hover:border-emerald-500 shadow-sm transition group">
                        <span class="font-medium text-sm"><i class="fa-solid fa-bed w-6 text-slate-400 group-hover:text-emerald-500"></i>Giường Ngủ</span>
                    </div>
                    <div onclick="taiMoHinh('models/nha_bep.glb', 'Bếp Nấu')" class="p-2.5 bg-white border border-slate-200 rounded-lg cursor-pointer hover:border-emerald-500 shadow-sm transition group">
                        <span class="font-medium text-sm"><i class="fa-solid fa-fire-burner w-6 text-slate-400 group-hover:text-emerald-500"></i>Gian Bếp</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- CENTER: CANVAS 3D -->
        <main class="flex-1 relative bg-slate-100" id="canvas-container">
            <div class="absolute bottom-6 right-6 bg-white/80 backdrop-blur px-4 py-2 rounded-full shadow-lg border border-white text-xs font-semibold text-slate-600">
                <i class="fa-solid fa-mouse text-emerald-600"></i> Chuột trái: Xoay | Chuột phải: Kéo | Lăn: Zoom
            </div>
        </main>

        <!-- SIDEBAR PHẢI: PHONG THỦY ENGINE -->
        <aside class="w-[340px] bg-white border-l border-slate-200 flex flex-col z-10 shrink-0">
            <div class="p-4 border-b border-slate-100 bg-slate-50/50">
                <h2 class="text-sm font-bold text-slate-800 uppercase flex items-center">
                    <i class="fa-solid fa-wand-magic-sparkles mr-2 text-amber-500"></i>Phân Tích Huyền Học
                </h2>
            </div>
            <div class="p-5 overflow-y-auto flex-1">
                <div class="space-y-4 mb-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Năm sinh Nam chủ</label>
                        <input type="number" id="namChong" class="w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm outline-none" placeholder="VD: 1990">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Năm sinh Nữ chủ</label>
                        <input type="number" id="namVo" class="w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm outline-none" placeholder="VD: 1992">
                    </div>
                    <button onclick="dongBoDuLieu()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-semibold py-2.5 rounded-md shadow-md text-sm transition">
                        <i class="fa-solid fa-compass"></i> Tối ưu Hướng Nội Thất
                    </button>
                </div>

                <!-- ĐÂY LÀ PHẦN BỊ THIẾU MÀ MÌNH VỪA BỔ SUNG VÀO -->
                <div id="ketQuaPanel" class="hidden border-t border-slate-100 pt-5">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Báo Cáo Chi Tiết</h3>
                    
                    <div class="bg-emerald-50 border border-emerald-100 rounded-lg p-3 mb-4">
                        <p id="thongTinChung" class="text-sm text-slate-700 leading-relaxed"></p>
                    </div>

                    <div class="relative pl-4 border-l-2 border-slate-200 space-y-4" id="logHanhDong">
                        <!-- Log hệ thống sẽ đổ vào đây -->
                    </div>
                </div>
                <!-- KẾT THÚC PHẦN BỔ SUNG -->

            </div>
        </aside>

    </div>

    <script>
        // ==========================================
        // 1. CẤU HÌNH KHÔNG GIAN 3D CƠ BẢN
        // ==========================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf1f5f9);

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 15, 15); // Nhìn từ trên cao xuống cho dễ vẽ

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Ánh sáng
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(5, 15, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Mặt sàn (Rất quan trọng để click chuột lên)
        const floorGeo = new THREE.PlaneGeometry(30, 30);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        floor.name = "MatSan"; // Đặt tên để Raycaster nhận diện
        scene.add(floor);

        // Lưới tọa độ
        const gridHelper = new THREE.GridHelper(30, 30, 0x000000, 0x000000);
        gridHelper.material.opacity = 0.1;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // ==========================================
        // 2. ENGINE VẼ TƯỜNG 3D (BUILDER)
        // ==========================================
        let dangVeTuong = false;
        let diemBatDau = null;
        let tuongBanNhap = null; // Bức tường mờ mờ chạy theo chuột

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function batTatVeTuong() {
            dangVeTuong = !dangVeTuong;
            const btn = document.getElementById('btnVeTuong');
            const hd = document.getElementById('huongDanVe');
            const stt = document.getElementById('trangThaiChung');

            if (dangVeTuong) {
                btn.innerHTML = `<i class="fa-solid fa-xmark"></i> Hủy vẽ (Đang bật)`;
                btn.classList.replace('bg-indigo-600', 'bg-red-500');
                btn.classList.replace('hover:bg-indigo-700', 'hover:bg-red-600');
                container.classList.add('cursor-draw');
                hd.classList.remove('hidden');
                stt.innerHTML = "Chế độ: Đang dựng tường";
                controls.enabled = false; // Tạm khóa tính năng xoay camera để không bị nhiễu lúc vẽ
            } else {
                ketThucVe();
                btn.innerHTML = `<i class="fa-solid fa-pen-ruler"></i> Bắt đầu vẽ tường`;
                btn.classList.replace('bg-red-500', 'bg-indigo-600');
                btn.classList.replace('hover:bg-red-600', 'hover:bg-indigo-700');
                container.classList.remove('cursor-draw');
                hd.classList.add('hidden');
                stt.innerHTML = "Chế độ: Xem 3D";
                controls.enabled = true; // Mở lại camera
            }
        }

        function ketThucVe() {
            diemBatDau = null;
            if (tuongBanNhap) {
                scene.remove(tuongBanNhap);
                tuongBanNhap = null;
            }
        }

        // Tạo 1 đoạn tường 3D kết nối điểm A và điểm B
        function taoTuong3D(p1, p2, isPreview = false) {
            const chieuCaoTuong = 2.8; // Tường cao 2.8m
            const doDayTuong = 0.2;    // Dày 20cm
            const khoangCach = p1.distanceTo(p2);

            const geo = new THREE.BoxGeometry(doDayTuong, chieuCaoTuong, khoangCach);
            
            // Nếu là bản nháp thì làm mờ, nếu là thật thì màu trắng
            const mat = new THREE.MeshStandardMaterial({ 
                color: isPreview ? 0x93c5fd : 0xffffff, // Xanh nhạt cho bản nháp
                transparent: isPreview, 
                opacity: isPreview ? 0.6 : 1,
                roughness: 0.9
            });

            const wall = new THREE.Mesh(geo, mat);
            wall.castShadow = true;
            wall.receiveShadow = true;

            // Đặt tường vào giữa 2 điểm
            wall.position.copy(p1).lerp(p2, 0.5);
            wall.position.y = chieuCaoTuong / 2; // Nhấc tường lên trên mặt sàn

            // Xoay bức tường hướng thẳng từ A sang B
            wall.lookAt(p2.x, chieuCaoTuong / 2, p2.z);

            return wall;
        }

        // BẮT SỰ KIỆN CHUỘT
        window.addEventListener('pointermove', (event) => {
            if (!dangVeTuong || !diemBatDau) return;

            // Tính tọa độ chuột trên màn hình
            const rect = container.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / container.clientWidth) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / container.clientHeight) * 2 + 1;

            // Phóng tia raycaster từ camera tới mặt sàn
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(floor);

            if (intersects.length > 0) {
                const diemHienTai = intersects[0].point;
                diemHienTai.y = 0; // Luôn bắt dính mặt sàn

                // Xóa bản nháp cũ, vẽ bản nháp mới
                if (tuongBanNhap) scene.remove(tuongBanNhap);
                
                // Chỉ vẽ nếu rê chuột xa hơn 0.1m
                if (diemBatDau.distanceTo(diemHienTai) > 0.1) {
                    tuongBanNhap = taoTuong3D(diemBatDau, diemHienTai, true);
                    scene.add(tuongBanNhap);
                }
            }
        });

        window.addEventListener('pointerdown', (event) => {
            if (!dangVeTuong) return;

            const rect = container.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / container.clientWidth) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / container.clientHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(floor);

            if (intersects.length > 0) {
                const diemClick = intersects[0].point;
                diemClick.y = 0;

                if (!diemBatDau) {
                    // Click lần 1: Chọn điểm bắt đầu
                    diemBatDau = diemClick;
                } else {
                    // Click lần 2: Chốt hạ bức tường thật
                    const tuongThat = taoTuong3D(diemBatDau, diemClick, false);
                    scene.add(tuongThat);
                    
                    // Lấy điểm cuối của tường vừa vẽ làm điểm bắt đầu cho tường tiếp theo
                    diemBatDau = diemClick;
                }
            }
        });

        // Bấm ESC để thoát chế độ vẽ
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && dangVeTuong) batTatVeTuong();
        });


        // ==========================================
        // 3. QUẢN LÝ MÔ HÌNH VÀ PHONG THỦY API (Giữ nguyên)
        // ==========================================
        const gltfLoader = new THREE.GLTFLoader();
        let vatTheHienTai = null;
        let tenVatTheHienTai = "";
        let gocXoayMucTieu = 0;

        // Tải mô hình vào giữa nhà
        window.taiMoHinh = function(duongDan, tenLoai) {
            if (vatTheHienTai) scene.remove(vatTheHienTai);
            
            gltfLoader.load(duongDan, function(gltf) {
                vatTheHienTai = gltf.scene;
                tenVatTheHienTai = tenLoai;
                gocXoayMucTieu = 0;
                
                vatTheHienTai.traverse(n => { if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; }});
                scene.add(vatTheHienTai);
            }, undefined, function(e) { alert("Không tải được file: " + duongDan); });
        };

        // Render Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            if (vatTheHienTai) vatTheHienTai.rotation.y += (gocXoayMucTieu - vatTheHienTai.rotation.y) * 0.05;
            renderer.render(scene, camera);
        }
        animate();

        window.dongBoDuLieu = function() {
            const namChong = document.getElementById('namChong').value;
            const namVo = document.getElementById('namVo').value;
            
            if(!namChong || !namVo) return alert("Vui lòng nhập năm sinh gia chủ!");
            if(!vatTheHienTai) return alert("Hãy thả nội thất vào không gian trước khi tính phong thủy!");

            // Gọi API thật tới máy chủ Spring Boot ở cổng 8083
            fetch(`http://localhost:8083/api/bo-tri-thong-minh?namSinhChong=${namChong}&namSinhVo=${namVo}`)
                .then(res => res.json())
                .then(data => {
                    // 1. Hiển thị thông báo phân tích lên bảng bên phải
                    document.getElementById('ketQuaPanel').classList.remove('hidden');
                    document.getElementById('thongTinChung').innerHTML = `
                        <strong class="text-emerald-700">Nam chủ:</strong> ${namChong}<br>
                        <strong class="text-amber-600">Nữ chủ:</strong> ${namVo}<br>
                        <span class="block mt-2 pt-2 border-t border-emerald-200 text-xs">${data.thongTinChung}</span>
                    `;
                    
                    // 2. Trích xuất hướng xoay từ Java trả về cho đúng vật thể đang hiển thị
                    const huongXoay = data.quyTacBoTri[tenVatTheHienTai]; 
                    
                    if(huongXoay) {
                        // 3. Ra lệnh cho 3D Engine thực thi việc xoay mượt mà
                        gocXoayMucTieu = tinhGocRadian(huongXoay); 
                        
                        // In lịch sử hành động
                        document.getElementById('logHanhDong').innerHTML = `
                            <div class="relative">
                                <div class="absolute -left-[21px] top-1 bg-emerald-500 h-2 w-2 rounded-full border border-white shadow-[0_0_5px_rgba(16,185,129,0.8)]"></div>
                                <p class="text-xs font-semibold text-slate-700">Đã định vị: ${tenVatTheHienTai}</p>
                                <p class="text-xs text-slate-500 mt-0.5">Hệ thống auto-layout xoay về: <span class="text-emerald-600 font-bold">${huongXoay}</span></p>
                            </div>
                        `;
                    } else {
                        alert("API chưa cấu hình luật phong thủy cho loại nội thất này: " + tenVatTheHienTai);
                    }
                })
                .catch(err => {
                    console.error("Lỗi Fetch:", err);
                    alert("Không thể kết nối với Backend. Hãy kiểm tra xem Spring Boot đã chạy ở cổng 8083 chưa nhé!");
                });
        }

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
