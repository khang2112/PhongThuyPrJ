<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FengShui 3D - Bố trí Không gian Thông minh</title>
    
    <!-- Tailwind CSS (Giao diện hiện đại) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome (Icon chuyên nghiệp) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a2e; font-family: 'Inter', sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        /* Hiệu ứng kính mờ cao cấp (Glassmorphism) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255,255,255,0.3);
            box-shadow: 4px 0 24px rgba(0,0,0,0.1);
        }

        /* Hiệu ứng loading */
        .spinner {
            border: 3px solid rgba(0,0,0,0.1); width: 24px; height: 24px; border-radius: 50%;
            border-left-color: #0ea5e9; animation: spin 1s linear infinite; display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="relative h-screen w-screen">

    <!-- KHÔNG GIAN 3D NẰM DƯỚI CÙNG -->
    <div id="canvas-container"></div>

    <!-- BẢNG ĐIỀU KHIỂN NỔI BÊN TRÁI -->
    <div class="glass-panel absolute top-0 left-0 h-full w-[380px] z-10 p-8 flex flex-col transition-all duration-300">
        
        <!-- Header -->
        <div class="mb-8 flex items-center gap-3">
            <div class="bg-blue-600 p-3 rounded-lg text-white shadow-lg shadow-blue-500/30">
                <i class="fa-solid fa-yin-yang text-2xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-gray-800 tracking-tight">FengShui 3D</h1>
                <p class="text-xs text-gray-500 font-medium uppercase tracking-wider">Smart Layout Engine</p>
            </div>
        </div>

        <!-- Form nhập liệu -->
        <div class="space-y-5 flex-grow">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Năm sinh gia chủ (Nam)</label>
                <div class="relative">
                    <i class="fa-solid fa-mars absolute left-3 top-3.5 text-gray-400"></i>
                    <input type="number" id="namChong" class="w-full pl-10 pr-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none" placeholder="VD: 1990">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Năm sinh phu nhân (Nữ)</label>
                <div class="relative">
                    <i class="fa-solid fa-venus absolute left-3 top-3.5 text-gray-400"></i>
                    <input type="number" id="namVo" class="w-full pl-10 pr-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-pink-500 focus:border-pink-500 transition-all outline-none" placeholder="VD: 1992">
                </div>
            </div>

            <button onclick="dongBoDuLieu()" class="w-full mt-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-blue-500/30 transform transition hover:-translate-y-0.5 active:translate-y-0 flex justify-center items-center gap-2">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Tối Ưu Hướng Nội Thất
            </button>
            
            <div id="loading" class="hidden text-center mt-4">
                <div class="spinner"></div>
                <p class="text-sm text-gray-500 mt-2 animate-pulse">Hệ thống đang tính toán Bát Trạch...</p>
            </div>
        </div>

        <!-- Vùng kết quả nổi -->
        <div id="ketQuaPanel" class="hidden mt-6 bg-white rounded-xl p-5 border border-gray-100 shadow-sm">
            <h3 class="text-sm font-bold text-gray-800 mb-3 border-b pb-2"><i class="fa-solid fa-clipboard-check text-green-500 mr-2"></i>Báo Cáo Phân Tích</h3>
            <p id="thongTinChung" class="text-sm text-gray-600 leading-relaxed mb-3"></p>
            <div class="bg-blue-50 p-3 rounded-lg border border-blue-100">
                <p class="text-xs text-blue-800 font-semibold"><i class="fa-solid fa-rotate mr-2"></i>Hành động Engine 3D:</p>
                <p id="logHanhDong" class="text-sm text-blue-900 mt-1"></p>
            </div>
        </div>

    </div>

    <!-- Logic 3D Cao Cấp -->
    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // 1. TỐI ƯU ÁNH SÁNG & SƯƠNG MÙ (Tạo độ sâu)
        scene.background = new THREE.Color(0xf0f2f5);
        scene.fog = new THREE.Fog(0xf0f2f5, 10, 30); // Hiệu ứng sương mù xa mờ

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 6, 8);

        // Nâng cấp Renderer: Khử răng cưa cực mượt và Bật đổ bóng vật lý
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // Render chuẩn HD
        renderer.shadowMap.enabled = true; // BẬT ĐỔ BÓNG
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Bóng mềm mại
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Quán tính khi xoay camera (Mượt)
        controls.dampingFactor = 0.05;

        // Ánh sáng môi trường (HemisphereLight cho ánh sáng tự nhiên)
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        hemiLight.position.set(0, 10, 0);
        scene.add(hemiLight);

        // Ánh sáng chiếu (Mặt trời sinh ra bóng)
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 8, 5);
        dirLight.castShadow = true; // Cho phép nguồn sáng này tạo bóng
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        dirLight.shadow.mapSize.width = 1024; // Tăng độ sắc nét của bóng
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // 2. MẶT SÀN CAO CẤP
        const floorGeo = new THREE.PlaneGeometry(20, 20);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true; // SÀN NHẬN BÓNG ĐỔ
        scene.add(floor);

        // Lưới tọa độ tinh tế hơn
        const gridHelper = new THREE.GridHelper(20, 40, 0x000000, 0x000000);
        gridHelper.material.opacity = 0.05;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // 3. VẬT THỂ CÓ ĐỔ BÓNG (Giường)
        const bedGroup = new THREE.Group();
        
        const headboard = new THREE.Mesh(new THREE.BoxGeometry(2, 1.2, 0.2), new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.6 }));
        headboard.position.set(0, 0.6, -1.4);
        headboard.castShadow = true; // Vật thể tạo bóng

        const mattress = new THREE.Mesh(new THREE.BoxGeometry(2, 0.4, 2.8), new THREE.MeshStandardMaterial({ color: 0xe0e7ff, roughness: 0.9 }));
        mattress.position.set(0, 0.2, 0);
        mattress.castShadow = true; // Vật thể tạo bóng

        bedGroup.add(headboard);
        bedGroup.add(mattress);
        scene.add(bedGroup);

        let gocXoayMucTieu = 0;

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Cần thiết cho Damping (độ mượt)
            bedGroup.rotation.y += (gocXoayMucTieu - bedGroup.rotation.y) * 0.05;
            renderer.render(scene, camera);
        }
        animate();

        // 4. XỬ LÝ LOGIC API TƯƠNG TỰ BẢN CŨ
        function tinhGocRadian(huong) {
            const PI = Math.PI;
            const dict = { "Bắc": 0, "Đông Bắc": PI/4, "Đông": PI/2, "Đông Nam": (3*PI)/4, "Nam": PI, "Tây Nam": (5*PI)/4, "Tây": (3*PI)/2, "Tây Bắc": (7*PI)/4 };
            return dict[huong] || 0;
        }

        function dongBoDuLieu() {
            const namChong = document.getElementById('namChong').value;
            const namVo = document.getElementById('namVo').value;
            
            if(!namChong || !namVo) return alert("Vui lòng nhập đầy đủ thông tin gia chủ!");

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('ketQuaPanel').classList.add('hidden');

            fetch(`http://localhost:8083/api/bo-tri-thong-minh?namSinhChong=${namChong}&namSinhVo=${namVo}`)
                .then(res => res.json())
                .then(data => {
                    setTimeout(() => { // Giả lập độ trễ 0.5s cho chuyên nghiệp
                        document.getElementById('loading').classList.add('hidden');
                        document.getElementById('ketQuaPanel').classList.remove('hidden');
                        
                        document.getElementById('thongTinChung').innerHTML = `<b>Gia chủ (Nam):</b> ${namChong}<br><b>Phu nhân (Nữ):</b> ${namVo}<br><br>${data.thongTinChung}`;
                        
                        const huongGiuong = data.quyTacBoTri["Giường Ngủ"];
                        gocXoayMucTieu = tinhGocRadian(huongGiuong);

                        document.getElementById('logHanhDong').innerHTML = `Phát hiện mô hình: <b>Giường Ngủ</b><br>Đã áp dụng la bàn tự động xoay về hướng: <b>${huongGiuong}</b>`;
                    }, 500);
                })
                .catch(err => {
                    document.getElementById('loading').classList.add('hidden');
                    alert("Không thể kết nối đến máy chủ Java (Port 8083)!");
                });
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
